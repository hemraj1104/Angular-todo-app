<h2>Todo List</h2>
<!-- used for showing loading -->
@if (!todoItems().length) {
  <p>Loading...</p>
}
<form>
  <label>Filter Todos</label>
  <input name="searchTerm" [(ngModel)]="searchTerm" placeholder="Search todos..." />
</form>

<ul class="todos">
  @for (todo of todoItems() | filterTodos:searchTerm(); track todo.id) {
    <app-todo-item [todo]="todo" (todoToggled)="updateTodoItem($event)" />
  }
</ul>
